industry: retail
display_name: 零售/电商
domain: retail
objects:
  - name: 订单
    description: 客户的采购订单
    business_context: 从下单到签收的全生命周期
    properties:
      - name: 订单号
        data_type: string
        semantic_type: order_id
      - name: 客户ID
        data_type: string
        semantic_type: customer_id
      - name: 金额
        data_type: number
        semantic_type: currency_cny
      - name: 状态
        data_type: string
        semantic_type: order_status
      - name: 下单时间
        data_type: datetime
        semantic_type: datetime

  - name: 客户
    description: 客户档案
    business_context: 客户基本信息与联系方式
    properties:
      - name: ID
        data_type: string
        semantic_type: customer_id
      - name: 客户名
        data_type: string
        semantic_type: person_name
      - name: 电话
        data_type: string
        semantic_type: phone
      - name: 地区
        data_type: string
        semantic_type: region

  - name: 库存
    description: 商品库存
    business_context: 各仓库的商品数量与成本
    properties:
      - name: 商品ID
        data_type: string
        semantic_type: product_id
      - name: 商品名
        data_type: string
        semantic_type: product_name
      - name: 数量
        data_type: number
        semantic_type: quantity
      - name: 成本
        data_type: number
        semantic_type: currency_cny

  - name: 商品
    description: 商品档案
    business_context: 商品基本信息
    properties:
      - name: ID
        data_type: string
        semantic_type: product_id
      - name: 名称
        data_type: string
        semantic_type: product_name
      - name: 分类
        data_type: string
        semantic_type: category
      - name: 售价
        data_type: number
        semantic_type: currency_cny

relationships:
  - from: 订单
    to: 客户
    type: belongs_to
    from_field: 客户ID
    to_field: ID
  - from: 库存
    to: 商品
    type: belongs_to
    from_field: 商品ID
    to_field: ID
