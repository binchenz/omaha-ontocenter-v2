# 金融股票分析配置 - 投资者友好版
# 改进：添加 business_context、ValuationMetric、StockProfile 聚合对象

datasources:
  - id: tushare_pro
    name: Tushare Pro API
    type: tushare
    connection:
      token: 044a35feee6c10f656343bdf3523014b88265b00bf2b586ed7c0ad90

ontology:
  objects:

    # ============================================================
    # 核心对象：股票基本信息
    # ============================================================
    - name: Stock
      datasource: tushare_pro
      api_name: stock_basic
      description: A股上市公司基本信息
      business_context: |
        股票基本信息是投资分析的起点。通过 ts_code 可以关联行情、财务等所有数据。
        投资者常用场景：
        - 按行业筛选股票（如"查找所有银行股"）
        - 按地区筛选（如"深圳的科技股"）
        - 查找特定股票（如"平安银行的代码"）
        注意：默认只返回上市状态的股票，退市股票已自动过滤。
      default_filters:
        - field: list_status
          operator: "="
          value: "L"
      properties:
        - name: ts_code
          type: string
          description: 股票代码，格式如 000001.SZ（深交所）或 600000.SH（上交所）
        - name: name
          type: string
          description: 股票名称，如"平安银行"
        - name: industry
          type: string
          description: 所属行业，如"银行"、"软件服务"、"医疗器械"
        - name: area
          type: string
          description: 注册地区，如"深圳"、"上海"、"北京"
        - name: market
          type: string
          description: 市场类型：主板、创业板、科创板
        - name: list_date
          type: string
          description: 上市日期（YYYYMMDD），上市越早通常越成熟
        - name: list_status
          type: string
          description: 上市状态：L=上市，D=退市，P=暂停上市

    # ============================================================
    # 日线行情
    # ============================================================
    - name: DailyQuote
      datasource: tushare_pro
      api_name: daily
      description: 股票日线行情数据（OHLCV）
      business_context: |
        日线行情是技术分析和趋势判断的基础数据。
        投资者常用场景：
        - 查看某只股票最近的价格走势
        - 分析涨跌幅（pct_chg）找出强势/弱势股
        - 通过成交量（vol）判断市场活跃度
        - 计算均线、波动率等技术指标
        重要提示：
        - pct_chg > 9.5% 通常表示涨停，< -9.5% 表示跌停
        - 成交量放大通常意味着主力资金介入
        - 需要指定 ts_code 才能查询，否则数据量过大
      properties:
        - name: ts_code
          type: string
          description: 股票代码
        - name: trade_date
          type: string
          description: 交易日期（YYYYMMDD）
        - name: open
          type: number
          description: 开盘价（元）
        - name: high
          type: number
          description: 最高价（元）
        - name: low
          type: number
          description: 最低价（元）
        - name: close
          type: number
          description: 收盘价（元），最常用的价格指标
        - name: pre_close
          type: number
          description: 昨收价（元）
        - name: change
          type: number
          description: 涨跌额（元）= 收盘价 - 昨收价
        - name: pct_chg
          type: number
          description: 涨跌幅（%），正数涨、负数跌，±9.5%附近为涨跌停
        - name: vol
          type: number
          description: 成交量（手，1手=100股），量能大小反映市场活跃度
        - name: amount
          type: number
          description: 成交额（千元），反映资金流入流出规模

    # ============================================================
    # 行业分类
    # ============================================================
    - name: Industry
      datasource: tushare_pro
      api_name: stock_basic
      description: 行业分类统计
      business_context: |
        行业分类用于行业对比和板块分析。
        投资者常用场景：
        - 查看某行业有多少只股票
        - 行业轮动分析（哪些行业最近表现好）
        - 找出某行业的龙头股
      properties:
        - name: industry
          type: string
          description: 行业名称，如"银行"、"白酒"、"新能源"
        - name: stock_count
          type: number
          description: 该行业上市股票数量

    # ============================================================
    # 估值指标（P0 新增）
    # ============================================================
    - name: ValuationMetric
      datasource: tushare_pro
      api_name: daily_basic
      description: 股票每日估值指标，包括市盈率、市净率、市值等
      business_context: |
        估值指标是判断股票贵贱的核心工具，是价值投资者最常用的数据。
        投资者常用场景：
        - 判断股票是否被低估（PE低、PB低）
        - 筛选高股息率股票（适合稳健投资者）
        - 比较同行业公司的估值水平
        - 查看公司总市值（判断大盘股/小盘股）
        关键指标解读：
        - PE（市盈率）= 股价/每股收益，越低越便宜，但亏损股PE为负无意义
        - PB（市净率）= 股价/每股净资产，<1 表示破净，银行股常见
        - PS（市销率）= 总市值/营业收入，适合亏损但有收入的成长股
        - 股息率 > 3% 通常被认为是高股息股票
        - 总市值 > 1000亿为大盘股，< 100亿为小盘股
        注意：需要指定 ts_code 和 trade_date 才能查询
      properties:
        - name: ts_code
          type: string
          description: 股票代码
        - name: trade_date
          type: string
          description: 交易日期（YYYYMMDD）
        - name: close
          type: number
          description: 当日收盘价（元）
        - name: turnover_rate
          type: number
          description: 换手率（%），反映股票活跃程度，过高可能是炒作
        - name: turnover_rate_f
          type: number
          description: 换手率（自由流通股，%）
        - name: volume_ratio
          type: number
          description: 量比，当日成交量/过去5日平均成交量，>2 表示放量
        - name: pe
          type: number
          description: 市盈率（PE，TTM），股价/过去12个月每股收益，越低越便宜
        - name: pe_ttm
          type: number
          description: 市盈率（TTM），滚动12个月，比静态PE更准确
        - name: pb
          type: number
          description: 市净率（PB），股价/每股净资产，<1为破净，银行股常见
        - name: ps
          type: number
          description: 市销率（PS），总市值/营业收入，适合评估成长股
        - name: ps_ttm
          type: number
          description: 市销率（TTM），滚动12个月
        - name: dv_ratio
          type: number
          description: 股息率（%），每股股息/股价，>3%为高股息股票
        - name: dv_ttm
          type: number
          description: 股息率（TTM，%），滚动12个月股息率
        - name: total_share
          type: number
          description: 总股本（万股）
        - name: float_share
          type: number
          description: 流通股本（万股），实际可交易的股票数量
        - name: free_share
          type: number
          description: 自由流通股本（万股），排除限售股后的流通股
        - name: total_mv
          type: number
          description: 总市值（万元），反映公司规模，>100亿为大盘股
        - name: circ_mv
          type: number
          description: 流通市值（万元），实际可交易部分的市值
      computed_properties:
        - name: market_cap_billion
          expression: "{total_mv} / 100000"
          semantic_type: number
          description: 总市值（亿元）
        - name: free_float_ratio
          expression: "{float_share} / {total_share}"
          semantic_type: percentage
          description: 流通比例（流通股/总股本）
    - name: FinancialIndicator
      datasource: tushare_pro
      api_name: fina_indicator
      description: 股票财务指标数据（盈利能力、偿债能力、运营效率）
      business_context: |
        财务指标是基本面分析的核心，反映公司的经营质量。
        投资者常用场景：
        - 筛选高ROE公司（巴菲特最看重的指标）
        - 分析公司盈利能力趋势（ROE/ROA是否持续提升）
        - 判断财务风险（资产负债率是否过高）
        - 比较同行业公司的经营效率
        关键指标解读：
        - ROE（净资产收益率）> 15% 通常被认为是优质公司
        - ROA（总资产报酬率）> 5% 表示资产利用效率较高
        - 毛利率越高说明产品竞争力越强（如茅台毛利率>90%）
        - 资产负债率 > 70% 需要警惕财务风险（银行除外）
        - 净利率持续提升说明公司盈利能力在改善
        查询方式：需要指定 ts_code，可用 start_date 指定起始报告期
      properties:
        - name: ts_code
          type: string
          semantic_type: stock_code
          description: 股票代码
        - name: end_date
          type: string
          semantic_type: date
          description: 报告期（YYYYMMDD），如20231231为2023年年报
        - name: eps
          type: number
          semantic_type: number
          description: 每股收益（元），越高越好，反映每股盈利能力
        - name: roe
          type: number
          semantic_type: percentage
          description: 净资产收益率（%），巴菲特最看重的指标，>15%为优质
        - name: roe_waa
          type: number
          semantic_type: percentage
          description: 加权平均ROE（%），更准确的ROE计算方式
        - name: roa
          type: number
          semantic_type: percentage
          description: 总资产报酬率（%），>5%表示资产利用效率较高
        - name: roic
          type: number
          semantic_type: percentage
          description: 投入资本回报率（%），衡量资本配置效率
        - name: grossprofit_margin
          type: number
          semantic_type: percentage
          description: 毛利率（%），越高说明产品竞争力越强，茅台>90%，普通制造业<30%
        - name: netprofit_margin
          type: number
          semantic_type: percentage
          description: 净利率（%），扣除所有成本后的盈利比例
        - name: debt_to_assets
          type: number
          semantic_type: percentage
          description: 资产负债率（%），>70%需警惕财务风险（银行除外）
        - name: current_ratio
          type: number
          semantic_type: number
          description: 流动比率，>2表示短期偿债能力强
        - name: quick_ratio
          type: number
          semantic_type: number
          description: 速动比率，>1表示短期偿债能力良好
        - name: assets_turn
          type: number
          semantic_type: number
          description: 总资产周转率，越高说明资产利用效率越高
        - name: ebit
          type: number
          semantic_type: currency_cny
          description: 息税前利润（元），排除财务杠杆影响的经营利润
        - name: fcff
          type: number
          semantic_type: currency_cny
          description: 企业自由现金流（元），正值且持续增长是优质公司标志
      computed_properties:
        - name: financial_health_score
          expression: "{roe} * 0.5 + {netprofit_margin} * 0.5"
          semantic_type: percentage
          description: 财务健康度评分（综合ROE、净利率）
        - name: profitability_score
          expression: "{roe} * 0.6 + {netprofit_margin} * 0.4"
          semantic_type: percentage
          description: 盈利能力评分（侧重ROE）
        - name: leverage_ratio
          expression: "{debt_to_assets} / 100"
          semantic_type: number
          description: 杠杆率（资产负债率转为倍数）
        - name: dupont_roe
          expression: "{netprofit_margin} * {assets_turn} * {assets_to_eqt}"
          semantic_type: percentage
          description: 杜邦ROE（净利率×资产周转率×权益乘数）
        - name: asset_efficiency
          expression: "{assets_turn} * 100"
          semantic_type: percentage
          description: 资产使用效率（资产周转率×100）

    # ============================================================
    # 利润表（精简版）
    # ============================================================
    - name: IncomeStatement
      datasource: tushare_pro
      api_name: income
      description: 利润表数据（收入、成本、利润）
      business_context: |
        利润表反映公司在一段时间内的经营成果，是分析公司成长性的关键。
        投资者常用场景：
        - 查看营业收入增长趋势（判断公司是否在扩张）
        - 分析净利润变化（判断盈利能力是否改善）
        - 对比营收和利润增速（利润增速>营收增速说明效率提升）
        - 查看非经常性损益（判断利润质量）
        关键指标解读：
        - 营收持续增长 + 净利润同步增长 = 高质量成长
        - 营收增长但净利润下降 = 成本控制出问题
        - 净利润大幅波动 = 可能有非经常性损益干扰
        查询方式：需要指定 ts_code，可用 start_date 指定起始报告期
      properties:
        - name: ts_code
          type: string
          semantic_type: stock_code
          description: 股票代码
        - name: end_date
          type: string
          semantic_type: date
          description: 报告期（YYYYMMDD）
        - name: report_type
          type: string
          semantic_type: text
          description: 报告类型：1=合并报表，2=单季合并
        - name: total_revenue
          type: number
          semantic_type: currency_cny
          description: 营业总收入（元），公司最顶层的收入规模
        - name: revenue
          type: number
          semantic_type: currency_cny
          description: 营业收入（元），主营业务收入
        - name: total_cogs
          type: number
          semantic_type: currency_cny
          description: 营业总成本（元）
        - name: operate_profit
          type: number
          semantic_type: currency_cny
          description: 营业利润（元），主营业务产生的利润
        - name: total_profit
          type: number
          semantic_type: currency_cny
          description: 利润总额（元），含营业外收支
        - name: n_income
          type: number
          semantic_type: currency_cny
          description: 净利润（元），扣除所得税后的最终利润
        - name: n_income_attr_p
          type: number
          semantic_type: currency_cny
          description: 归母净利润（元），归属于母公司股东的净利润，最常用
        - name: ebit
          type: number
          semantic_type: currency_cny
          description: 息税前利润（元）
        - name: ebitda
          type: number
          semantic_type: currency_cny
          description: 息税折旧摊销前利润（元），现金流分析常用
      computed_properties:
        - name: profit_margin
          expression: "{n_income} / {total_revenue}"
          semantic_type: percentage
          description: 净利率（净利润/营业总收入）
        - name: operating_margin
          expression: "{operate_profit} / {total_revenue}"
          semantic_type: percentage
          description: 营业利润率（营业利润/营业总收入）

    # ============================================================
    # 资产负债表（Phase 4.1 新增）
    # ============================================================
    - name: BalanceSheet
      datasource: tushare_pro
      api_name: balancesheet
      description: 资产负债表数据（资产、负债、所有者权益）
      business_context: |
        资产负债表反映公司在某一时点的财务状况，是判断公司财务健康度的关键。
        投资者常用场景：
        - 查看公司资产规模（总资产越大说明公司越大）
        - 分析负债结构（短期负债/长期负债比例）
        - 判断偿债能力（流动资产/流动负债）
        - 查看现金储备（货币资金是否充足）
        关键指标解读：
        - 总资产 = 流动资产 + 非流动资产
        - 总负债 = 流动负债 + 非流动负债
        - 所有者权益 = 总资产 - 总负债
        - 资产负债率 = 总负债/总资产，>70%需警惕（银行除外）
        - 流动比率 = 流动资产/流动负债，>2表示短期偿债能力强
        查询方式：需要指定 ts_code，可用 start_date 指定起始报告期
      properties:
        - name: ts_code
          type: string
          semantic_type: stock_code
          description: 股票代码
        - name: end_date
          type: string
          semantic_type: date
          description: 报告期（YYYYMMDD）
        - name: report_type
          type: string
          semantic_type: text
          description: 报告类型：1=合并报表，2=单季合并
        - name: total_assets
          type: number
          semantic_type: currency_cny
          description: 总资产（元），反映公司规模
        - name: total_cur_assets
          type: number
          semantic_type: currency_cny
          description: 流动资产（元），1年内可变现的资产
        - name: total_nca
          type: number
          semantic_type: currency_cny
          description: 非流动资产（元），长期资产如固定资产、无形资产
        - name: money_cap
          type: number
          semantic_type: currency_cny
          description: 货币资金（元），现金及银行存款，越多越安全
        - name: accounts_receiv
          type: number
          semantic_type: currency_cny
          description: 应收账款（元），过高说明回款慢
        - name: inventories
          type: number
          semantic_type: currency_cny
          description: 存货（元），过高可能积压
        - name: total_liab
          type: number
          semantic_type: currency_cny
          description: 总负债（元）
        - name: total_cur_liab
          type: number
          semantic_type: currency_cny
          description: 流动负债（元），1年内需偿还的债务
        - name: total_ncl
          type: number
          semantic_type: currency_cny
          description: 非流动负债（元），长期负债
        - name: total_hldr_eqy_exc_min_int
          type: number
          semantic_type: currency_cny
          description: 股东权益合计（元），归属于母公司的所有者权益
        - name: total_hldr_eqy_inc_min_int
          type: number
          semantic_type: currency_cny
          description: 股东权益合计（含少数股东权益）
      computed_properties:
        - name: debt_to_asset_ratio
          expression: "{total_liab} / {total_assets}"
          semantic_type: percentage
          description: 资产负债率（总负债/总资产）
        - name: current_ratio
          expression: "{total_cur_assets} / {total_cur_liab}"
          semantic_type: ratio
          description: 流动比率（流动资产/流动负债）
        - name: equity_ratio
          expression: "{total_hldr_eqy_exc_min_int} / {total_assets}"
          semantic_type: percentage
          description: 股东权益比率（股东权益/总资产）

    # ============================================================
    # 现金流量表（Phase 4.1 新增）
    # ============================================================
    - name: CashFlow
      datasource: tushare_pro
      api_name: cashflow
      description: 现金流量表数据（经营、投资、筹资活动现金流）
      business_context: |
        现金流量表反映公司的现金流入流出情况，是判断公司真实盈利质量的关键。
        投资者常用场景：
        - 判断公司是否真的赚到现金（经营现金流 vs 净利润）
        - 查看公司投资活动（是否在扩张）
        - 分析筹资活动（是否在融资或分红）
        - 判断公司现金流健康度
        关键指标解读：
        - 经营现金流 > 净利润：说明利润质量高，真金白银
        - 经营现金流 < 净利润：可能存在应收账款过多等问题
        - 投资现金流为负：说明公司在投资扩张（买设备、并购等）
        - 筹资现金流为正：说明公司在融资（发债、增发等）
        - 筹资现金流为负：说明公司在分红或还债
        - 自由现金流 = 经营现金流 - 资本支出，>0 说明公司有余钱
        查询方式：需要指定 ts_code，可用 start_date 指定起始报告期
      properties:
        - name: ts_code
          type: string
          semantic_type: stock_code
          description: 股票代码
        - name: end_date
          type: string
          semantic_type: date
          description: 报告期（YYYYMMDD）
        - name: report_type
          type: string
          semantic_type: text
          description: 报告类型：1=合并报表，2=单季合并
        - name: n_cashflow_act
          type: number
          semantic_type: currency_cny
          description: 经营活动现金流净额（元），主营业务产生的现金流
        - name: n_cashflow_inv_act
          type: number
          semantic_type: currency_cny
          description: 投资活动现金流净额（元），为负说明在投资扩张
        - name: n_cash_flows_fnc_act
          type: number
          semantic_type: currency_cny
          description: 筹资活动现金流净额（元），为正说明在融资
        - name: c_cash_equ_end_period
          type: number
          semantic_type: currency_cny
          description: 期末现金及现金等价物余额（元）
        - name: c_cash_equ_beg_period
          type: number
          semantic_type: currency_cny
          description: 期初现金及现金等价物余额（元）
      computed_properties:
        - name: cash_change
          expression: "{c_cash_equ_end_period} - {c_cash_equ_beg_period}"
          semantic_type: currency_cny
          description: 现金净增加额（期末现金 - 期初现金）
        - name: total_cashflow
          expression: "{n_cashflow_act} + {n_cashflow_inv_act} + {n_cash_flows_fnc_act}"
          semantic_type: currency_cny
          description: 三大活动现金流合计

    # ============================================================
    # 板块分类（Phase 3 新增）
    # ============================================================
    - name: Sector
      datasource: tushare_pro
      api_name: concept
      description: 概念板块分类（新能源、AI、半导体等热门概念）
      business_context: |
        概念板块是投资者按主题筛选股票的重要工具。
        常见热门板块：
        - 新能源（TS101）：光伏、风电、储能、新能源汽车
        - 人工智能（TS300）：AI芯片、大模型、算力
        - 半导体（TS200）：芯片设计、制造、封测
        - 医药（TS400）：创新药、医疗器械、CXO
        使用场景：
        - 找出新能源板块中ROE最高的股票
        - 筛选AI概念股中市值超过100亿的公司
        - 对比不同板块的平均估值水平
      properties:
        - name: code
          type: string
          description: 板块代码，如TS101（新能源）
        - name: name
          type: string
          description: 板块名称，如"新能源"、"人工智能"
        - name: src
          type: string
          description: 数据来源

    - name: SectorMember
      datasource: tushare_pro
      api_name: concept_detail
      description: 板块成分股（股票与板块的多对多关系）
      business_context: |
        记录每只股票所属的概念板块。
        一只股票可以属于多个板块（如宁德时代同时属于新能源、锂电池、储能等板块）。
        查询时需要指定板块代码（id参数）。
      properties:
        - name: id
          type: string
          description: 板块代码，如TS101
        - name: ts_code
          type: string
          description: 股票代码
        - name: name
          type: string
          description: 股票名称
        - name: in_date
          type: string
          description: 纳入日期
        - name: out_date
          type: string
          description: 剔除日期（如果为空表示仍在板块内）

    # ============================================================
    # 技术指标（Phase 3 新增，基于日线数据计算）
    # ============================================================
    - name: TechnicalIndicator
      datasource: tushare_pro
      api_name: computed_technical
      description: 股票技术指标（MA、MACD、RSI、KDJ），基于日线数据实时计算
      business_context: |
        技术指标是判断股票短期走势和买卖时机的工具，适合趋势交易者。
        投资者常用场景：
        - 判断股票是否处于上升趋势（MA5 > MA20 为金叉）
        - 判断超买超卖（RSI > 70 超买，RSI < 30 超卖）
        - 判断MACD金叉/死叉（macd_bar > 0 为多头）
        - KDJ判断短期买卖点（J < 0 超卖，J > 100 超买）
        关键指标解读：
        - MA（均线）：MA5上穿MA20为金叉（买入信号），下穿为死叉（卖出信号）
        - MACD：macd_bar > 0 且由负转正为金叉，是中期买入信号
        - RSI：0-100之间，>70超买（可能回调），<30超卖（可能反弹）
        - KDJ：J值最敏感，J<0为超卖，J>100为超买
        - ma_signal: bullish=均线多头，bearish=均线空头
        - macd_signal: bullish=MACD多头，bearish=MACD空头
        - rsi_signal: overbought=超买，oversold=超卖，neutral=中性
        注意：必须指定 ts_code 才能查询，系统会自动获取120天数据并计算指标
      properties:
        - name: ts_code
          type: string
          description: 股票代码
        - name: trade_date
          type: string
          description: 交易日期（YYYYMMDD）
        - name: close
          type: number
          description: 收盘价（元）
        - name: ma5
          type: number
          description: 5日均线，短期趋势指标
        - name: ma10
          type: number
          description: 10日均线，短期趋势指标
        - name: ma20
          type: number
          description: 20日均线，中期趋势指标
        - name: ma60
          type: number
          description: 60日均线，长期趋势指标
        - name: macd_dif
          type: number
          description: MACD DIF线（快线），12日EMA - 26日EMA
        - name: macd_dea
          type: number
          description: MACD DEA线（慢线），DIF的9日EMA
        - name: macd_bar
          type: number
          description: MACD柱（能量柱），>0为多头，<0为空头，由负转正为金叉
        - name: rsi14
          type: number
          description: RSI(14)，>70超买，<30超卖，50为多空分界线
        - name: kdj_k
          type: number
          description: KDJ K值，与D值交叉产生买卖信号
        - name: kdj_d
          type: number
          description: KDJ D值，较K值平滑
        - name: kdj_j
          type: number
          description: KDJ J值，最敏感，<0超卖，>100超买
        - name: ma_signal
          type: string
          description: 均线信号：bullish=多头排列，bearish=空头排列，neutral=中性
        - name: macd_signal
          type: string
          description: MACD信号：bullish=多头，bearish=空头，neutral=中性
        - name: rsi_signal
          type: string
          description: RSI信号：overbought=超买，oversold=超卖，neutral=中性
      computed_properties:
        - name: trend_score
          expression: "({macd_bar} * 10) + ({rsi14} - 50)"
          semantic_type: number
          description: 综合趋势评分（MACD能量柱 + RSI偏离中性）
        - name: ma_gap
          expression: "({ma5} - {ma20}) / {ma20} * 100"
          semantic_type: percentage
          description: 短期均线偏离度（MA5偏离MA20的百分比）

  relationships:
    - name: stock_daily_quotes
      description: 股票的日线行情数据
      from_object: Stock
      to_object: DailyQuote
