        from_field: ts_code
        to_field: ts_code

    - name: stock_industry
      description: 股票所属行业
      from_object: Stock
      to_object: Industry
      type: many_to_one
      join_condition:
        from_field: industry
        to_field: industry

    - name: stock_valuation
      description: 股票的每日估值指标（PE、PB、市值等）
      from_object: Stock
      to_object: ValuationMetric
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: stock_financial_indicators
      description: 股票的财务指标数据
      from_object: Stock
      to_object: FinancialIndicator
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: stock_income_statements
      description: 股票的利润表数据
      from_object: Stock
      to_object: IncomeStatement
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: stock_balance_sheets
      description: 股票的资产负债表数据
      from_object: Stock
      to_object: BalanceSheet
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: stock_cash_flows
      description: 股票的现金流量表数据
      from_object: Stock
      to_object: CashFlow
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: stock_technical_indicators
      description: 股票的技术指标（MA、MACD、RSI、KDJ）
      from_object: Stock
      to_object: TechnicalIndicator
      type: one_to_many
      join_condition:
        from_field: ts_code
        to_field: ts_code

    - name: sector_members
      description: 板块成分股（股票与板块的多对多关系）
      from_object: Sector
      to_object: SectorMember
      type: one_to_many
      join_condition:
        from_field: code
        to_field: id
