version: '3.8'

services:
  postgres:
    image: postgres:14
    container_name: omaha_postgres
    environment:
      POSTGRES_USER: omaha
      POSTGRES_PASSWORD: omaha_password
      POSTGRES_DB: omaha_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omaha"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omaha_backend
    environment:
      DATABASE_URL: postgresql://omaha:omaha_password@postgres:5432/omaha_db
      SECRET_KEY: ${SECRET_KEY}
      DATAHUB_GMS_URL: ${DATAHUB_GMS_URL}
      DATAHUB_GMS_TOKEN: ${DATAHUB_GMS_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omaha_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
