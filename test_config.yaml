datasources:
  - id: ppy_mysql
    type: mysql
    connection:
      host: 60.190.243.69
      port: 9030
      database: agent
      user: root
      password: ${MYSQL_PASSWORD}

ontology:
  objects:
    - name: Product
      datasource: ppy_mysql
      table: dm_ppy_product_info_ymd
      primary_key: sku_id
      properties:
        - name: sku_id
          column: sku_id
          type: string
          description: "商品SKU ID"
        - name: product_name
          column: product_name
          type: string
          description: "商品名称"
        - name: brand_name
          column: brand_name
          type: string
          description: "品牌名称"

    - name: GoodsMallMapping
      datasource: ppy_mysql
      table: dm_ppy_goods_mall_relation_mapping
      primary_key: ppy_goods_id
      properties:
        - name: ppy_goods_id
          column: ppy_goods_id
          type: string
          description: "PPY商品ID"
        - name: platform_name
          column: platform_name
          type: string
          description: "平台名称"
        - name: mall_goods_id
          column: mall_goods_id
          type: string
          description: "商城商品ID"

  relationships:
    - name: product_to_platform_mapping
      description: "商品到平台映射关系"
      from_object: Product
      to_object: GoodsMallMapping
      type: one_to_many
      join_condition:
        from_field: sku_id
        to_field: ppy_goods_id
