# Omaha OntoCenter - 重新设计的 Ontology
# 设计原则：
# 1. 对象代表业务实体，不是数据表

# 2. 分离不同粒度的数据
# 3. 明确标注粒度和业务语义
# 4. 关系反映业务含义

datasources:
  - id: ppy_mysql
    type: mysql
    connection:
      host: 60.190.243.69
      port: 9030
      database: agent
      user: agent_write
      password: Batch@Sr2026!Agent

ontology:
  # ============================================
  # 核心对象（业务实体）
  # ============================================

  objects:
    # 商品主数据（不含价格，只有基础属性）
    - name: Product
      description: 商品主数据，代表拼便宜平台销售的商品实体
      datasource: ppy_mysql
      table: dm_ppy_product_info_ymd
      primary_key: sku_id
      business_context: |
        商品是核心业务对象，包含商品的基础属性（名称、规格、品类等）。
        价格、成本、销量等动态数据在其他对象中维护。
      granularity:
        dimensions: [sku_id]
        level: master_data
        description: 商品主数据，一个 SKU 一条记录
      properties:
        - name: sku_id
          column: sku_id
          type: integer
          semantic_type: id
          description: SKU ID
          business_context: 商品唯一标识
        - name: sku_name
          column: sku_name
          type: string
          description: SKU名称
        - name: product_name
          column: product_name
          type: string
          description: 商品名称
          business_context: 商品的通用名称，可能包含多个 SKU
        - name: specification
          column: specification
          type: string
          description: 规格
          business_context: 如"500g"、"1kg"等
        - name: unit
          column: unit
          type: string
          description: 单位
          business_context: 如"瓶"、"袋"、"个"等
        - name: brand_name
          column: brand_name
          type: string
          description: 品牌名称
        - name: product_type_first_level
          column: product_type_first_level
          type: string
          description: 一级品类
          business_context: 商品所属的顶级分类
        - name: product_type_second_level
          column: product_type_second_level
          type: string
          description: 二级品类
          business_context: 商品所属的二级分类

    # 品类对象
    - name: Category
      description: 商品品类，用于商品分类管理和分析
      datasource: ppy_mysql
      # 注：这里假设从 Product 表中提取唯一的品类
      query: |
        SELECT DISTINCT
          product_type_first_level as category_name,
          product_type_first_level as first_level,
          NULL as second_level,
          1 as level
        FROM dm_ppy_product_info_ymd
        UNION
        SELECT DISTINCT
          product_type_second_level as category_name,
          product_type_first_level as first_level,
          product_type_second_level as second_level,
          2 as level
        FROM dm_ppy_product_info_ymd
        WHERE product_type_second_level IS NOT NULL
      primary_key: category_name
      business_context: |
        品类用于商品分类管理，支持两级分类体系。
        可以按品类分析销售表现、价格策略等。
      properties:
        - name: category_name
          type: string
          description: 品类名称
        - name: first_level
          type: string
          description: 一级品类
        - name: second_level
          type: string
          description: 二级品类（一级品类此字段为空）
        - name: level
          type: integer
          description: 品类层级（1=一级，2=二级）

    # 城市对象
    - name: City
      description: 销售城市，代表拼便宜的业务覆盖区域
      datasource: ppy_mysql
      query: |
        SELECT DISTINCT city as city_name
        FROM dm_ppy_product_info_ymd
        WHERE city IS NOT NULL
      primary_key: city_name
      business_context: |
        城市是重要的业务维度，不同城市有不同的价格策略、成本结构。
        城市级数据是很多分析的基础粒度。
      properties:
        - name: city_name
          type: string
          description: 城市名称

    # 竞品平台对象
    - name: Platform
      description: 竞品平台，如京东到家、永辉、小象超市等
      datasource: ppy_mysql
      query: |
        SELECT DISTINCT platform_name
        FROM dm_ppy_platform_product_info_rel_ymd
        WHERE platform_name IS NOT NULL
      primary_key: platform_name
      business_context: |
        竞品平台是价格对比的基准。
        不同平台有不同的定价策略和市场定位。
      properties:
        - name: platform_name
          type: string
          description: 平台名称
          business_context: 如"京东到家"、"永辉"、"小象超市"

    # 业务中心对象
    - name: BusinessCenter
      description: 业务中心，代表拼便宜的运营组织单元
      datasource: ppy_mysql
      query: |
        SELECT DISTINCT business_center as center_name
        FROM dm_ppy_product_info_ymd
        WHERE business_center IS NOT NULL
      primary_key: center_name
      business_context: |
        业务中心是运营管理的基本单元，负责特定区域的商品运营。
      properties:
        - name: center_name
          type: string
          description: 业务中心名称

  # ============================================
  # 价格对象（不同粒度）
  # ============================================

    # 商品价格（城市级，按日期）
    - name: ProductPrice
      description: 商品在各城市的售价（按日期）
      datasource: ppy_mysql
      table: dm_ppy_product_info_ymd
      primary_key: [sku_id, city, p_date]
      business_context: |
        记录商品在不同城市、不同日期的售价和促销价。
        这是价格分析的基础数据。
      granularity:
        dimensions: [sku_id, city, p_date]
        level: city_daily
        description: 城市+日期粒度的价格数据
      properties:
        - name: p_date
          column: p_date
          type: date
          semantic_type: date
          description: 数据日期
        - name: sku_id
          column: sku_id
          type: integer
          semantic_type: id
          description: SKU ID
        - name: city
          column: city
          type: string
          description: 城市
        - name: ppy_price
          column: ppy_price
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 拼便宜售价
          business_context: 商品在该城市的正常售价
        - name: ppy_promotion_price
          column: ppy_promotion_price
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 拼便宜促销价
          business_context: 促销期间的特殊价格，可能为空
        - name: on_sell_status
          column: on_sell_status
          type: string
          semantic_type: enum
          description: 上架状态
          enum_values:
            - value: "1"
              label: "在售"
            - value: "0"
              label: "下架"
          business_context: 商品在该城市的销售状态
      computed_properties:
        - name: effective_price
          formula: "COALESCE(ppy_promotion_price, ppy_price)"
          return_type: currency
          description: 有效售价
          business_context: 如果有促销价则用促销价，否则用正常售价

    # 商品成本（城市级，按日期）
    - name: ProductCost
      description: 商品在各城市的进货成本（按日期）
      datasource: ppy_mysql
      table: dm_ppy_product_info_ymd
      primary_key: [sku_id, city, p_date]
      business_context: |
        记录商品在不同城市的进货成本。
        成本数据用于计算毛利率、定价策略分析等。
      granularity:
        dimensions: [sku_id, city, p_date]
        level: city_daily
        description: 城市+日期粒度的成本数据
        note: 实际成本可能有批次维度，这里取平均值
      properties:
        - name: p_date
          column: p_date
          type: date
          semantic_type: date
          description: 数据日期
        - name: sku_id
          column: sku_id
          type: integer
          semantic_type: id
          description: SKU ID
        - name: city
          column: city
          type: string
          description: 城市
        - name: ppy_current_cost
          column: ppy_current_cost
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 当前成本价
          business_context: 商品在该城市的平均进货成本

    # 商品销售数据（城市级，按日期）
    - name: ProductSales
      description: 商品在各城市的销售数据（按日期）
      datasource: ppy_mysql
      table: dm_ppy_product_info_ymd
      primary_key: [sku_id, city, p_date]
      business_context: |
        记录商品的销售额和销量数据。
        用于销售分析、库存管理、定价优化等。
      granularity:
        dimensions: [sku_id, city, p_date]
        level: city_daily
        description: 城市+日期粒度的销售数据
      properties:
        - name: p_date
          column: p_date
          type: date
          semantic_type: date
          description: 数据日期
        - name: sku_id
          column: sku_id
          type: integer
          semantic_type: id
          description: SKU ID
        - name: city
          column: city
          type: string
          description: 城市
        - name: v_order_goods_amount
          column: v_order_goods_amount
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 当日销售额
        - name: v_goods_count
          column: v_goods_count
          type: integer
          description: 当日销量
        - name: v_order_goods_amount_30d
          column: v_order_goods_amount_30d
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 近30天销售额
          business_context: 滚动30天的累计销售额
        - name: v_goods_count_30d
          column: v_goods_count_30d
          type: integer
          description: 近30天销量
          business_context: 滚动30天的累计销量
      computed_properties:
        - name: avg_daily_sales_30d
          formula: "v_order_goods_amount_30d / 30"
          return_type: currency
          description: 近30天日均销售额
          business_context: 用于评估商品的销售稳定性

    # 竞品价格（城市+平台级，按日期）
    - name: CompetitorPrice
      description: 竞品平台的商品价格（按城市、平台、日期）
      datasource: ppy_mysql
      table: dm_ppy_platform_product_info_rel_ymd
      primary_key: [sku_id, city, platform_name, p_date]
      business_context: |
        记录竞品平台的商品价格，用于价格对比分析。
        同一商品在不同平台、不同城市的价格可能不同。
      granularity:
        dimensions: [sku_id, city, platform_name, p_date]
        level: city_platform_daily
        description: 城市+平台+日期粒度的竞品价格
      properties:
        - name: p_date
          column: p_date
          type: date
          semantic_type: date
          description: 数据日期
        - name: sku_id
          column: sku_id
          type: integer
          semantic_type: id
          description: SKU ID
        - name: sku_name
          column: sku_name
          type: string
          description: SKU名称
        - name: city
          column: city
          type: string
          description: 城市
        - name: platform_name
          column: platform_name
          type: string
          description: 竞品平台名称
        - name: ppy_price
          column: ppy_price
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 拼便宜售价（用于对比）
        - name: mall_price
          column: mall_price
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 竞品平台售价
          business_context: 竞品平台在该城市的售价
        - name: price_gap
          column: price_gap
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 价差（拼便宜-竞品）
          business_context: 正值表示我们更贵，负值表示我们更便宜
        - name: price_advantage_flag
          column: price_advantage_flag
          type: string
          semantic_type: enum
          description: 价格优势标识
          enum_values:
            - value: "1"
              label: "有优势"
            - value: "0"
              label: "无优势"
          business_context: 1表示我们的价格更有竞争力
        - name: min_price
          column: min_price
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 市场最低价
          business_context: 该商品在所有平台中的最低价
        - name: estimated_daily_loss
          column: estimated_daily_loss
          type: decimal
          semantic_type: currency
          currency: CNY
          description: 预估日损失
          business_context: 因价格劣势导致的预估销售损失
      computed_properties:
        - name: price_gap_percentage
          formula: "price_gap / mall_price"
          return_type: percentage
          description: 价差百分比
          business_context: 相对于竞品价格的差异比例

  # ============================================
  # 分析对象
  # ============================================

    # 价格预警（替代原来的 MonitorSummary）
    - name: PriceAlert
      description: 价格异常预警记录
      datasource: ppy_mysql
      table: dm_monitor_summary
      primary_key: [p_date, platform_name, city, check_type]
      business_context: |
        记录价格监控系统发现的异常情况。
        用于价格管理、异常处理、运营决策。
      granularity:
        dimensions: [p_date, platform_name, city, check_type]
        level: daily_summary
        description: 按日期、平台、城市、检查类型汇总的预警数据
      properties:
        - name: p_date
          column: p_date
          type: date
          semantic_type: date
          description: 数据日期
        - name: platform_name
          column: platform_name
          type: string
          description: 平台名称
        - name: city
          column: city
          type: string
          description: 城市
        - name: check_type
          column: check_type
          type: string
          description: 检查类型
          business_context: 如"价格过高"、"价格过低"、"价格波动异常"等
        - name: priority
          column: priority
          type: string
          description: 优先级
          business_context: 如"高"、"中"、"低"
        - name: anomaly_count
          column: anomaly_count
          type: integer
          description: 异常数量
          business_context: 该类型异常的商品数量
        - name: handle_status
          column: handle_status
          type: string
          description: 处理状态
          business_context: 如"待处理"、"处理中"、"已解决"

    # 商品映射（替代原来的 GoodsMallMapping）
    - name: ProductMapping
      description: 拼便宜商品与竞品平台商品的映射关系
      datasource: ppy_mysql
      table: dm_ppy_goods_mall_relation_mapping
      primary_key: id
      business_context: |
        记录我们的商品和竞品平台商品的对应关系。
        用于价格对比、竞品分析等场景。
      properties:
        - name: ppy_goods_id
          column: ppy_goods_id
          type: integer
          semantic_type: id
          description: 拼便宜商品ID
        - name: ppy_goods_name
          column: ppy_goods_name
          type: string
          description: 拼便宜商品名称
        - name: platform_name
          column: platform_name
          type: string
          description: 竞品平台名称
        - name: goods_name
          column: goods_name
          type: string
          description: 竞品商品名称
        - name: city_name
          column: city_name
          type: string
          description: 城市
        - name: similarity
          column: similarity
          type: decimal
          semantic_type: percentage
          description: 商品相似度
          business_context: 通过算法计算的商品相似度，用于判断映射质量
        - name: is_relation
          column: is_relation
          type: integer
          description: 是否关联
          business_context: 1表示确认关联，0表示不关联
        - name: coefficient
          column: coefficient
          type: decimal
          description: 价格系数
          business_context: 用于价格换算的系数（如规格不同时）

  # ============================================
  # 对象关系（业务语义）
  # ============================================

  relationships:
    # Product 的关系
    - name: product_belongs_to_category
      description: 商品所属品类，用于商品分类管理和品类分析
      from_object: Product
      to_object: Category
      type: many_to_one
      join_condition:
        from_field: product_type_second_level
        to_field: category_name
      business_context: |
        每个商品属于一个二级品类。
        通过品类可以分析不同类别商品的表现。

    # ProductPrice 的关系
    - name: price_of_product
      description: 价格属于哪个商品
      from_object: ProductPrice
      to_object: Product
      type: many_to_one
      join_condition:
        from_field: sku_id
        to_field: sku_id
      business_context: 一个商品在不同城市、不同日期有多个价格记录

    - name: price_in_city
      description: 价格所在城市
      from_object: ProductPrice
      to_object: City
      type: many_to_one
      join_condition:
        from_field: city
        to_field: city_name
      business_context: 价格按城市维度管理

    # ProductCost 的关系
    - name: cost_of_product
      description: 成本属于哪个商品
      from_object: ProductCost
      to_object: Product
      type: many_to_one
      join_condition:
        from_field: sku_id
        to_field: sku_id

    - name: cost_in_city
      description: 成本所在城市
      from_object: ProductCost
      to_object: City
      type: many_to_one
      join_condition:
        from_field: city
        to_field: city_name

    # ProductSales 的关系
    - name: sales_of_product
      description: 销售数据属于哪个商品
      from_object: ProductSales
      to_object: Product
      type: many_to_one
      join_condition:
        from_field: sku_id
        to_field: sku_id

    - name: sales_in_city
      description: 销售数据所在城市
      from_object: ProductSales
      to_object: City
      type: many_to_one
      join_condition:
        from_field: city
        to_field: city_name

    # CompetitorPrice 的关系
    - name: competitor_price_of_product
      description: 竞品价格对应的商品
      from_object: CompetitorPrice
      to_object: Product
      type: many_to_one
      join_condition:
        from_field: sku_id
        to_field: sku_id
      business_context: 竞品价格用于和我们的商品价格对比

    - name: competitor_price_on_platform
      description: 竞品价格所在平台
      from_object: CompetitorPrice
      to_object: Platform
      type: many_to_one
      join_condition:
        from_field: platform_name
        to_field: platform_name
      business_context: 不同平台有不同的定价策略

    - name: competitor_price_in_city
      description: 竞品价格所在城市
      from_object: CompetitorPrice
      to_object: City
      type: many_to_one
      join_condition:
        from_field: city
        to_field: city_name

    # PriceAlert 的关系
    - name: alert_on_platform
      description: 预警涉及的平台
      from_object: PriceAlert
      to_object: Platform
      type: many_to_one
      join_condition:
        from_field: platform_name
        to_field: platform_name

    - name: alert_in_city
      description: 预警所在城市
      from_object: PriceAlert
      to_object: City
      type: many_to_one
      join_condition:
        from_field: city
        to_field: city_name

    # ProductMapping 的关系
    - name: mapping_of_product
      description: 映射关系对应的商品
      from_object: ProductMapping
      to_object: Product
      type: many_to_one
      join_condition:
        from_field: ppy_goods_id
        to_field: sku_id

    - name: mapping_to_platform
      description: 映射到的竞品平台
      from_object: ProductMapping
      to_object: Platform
      type: many_to_one
      join_condition:
        from_field: platform_name
        to_field: platform_name

  # ============================================
  # 业务指标（跨对象聚合）
  # ============================================

  metrics:
    # 商品相关指标
    - name: total_products
      label: 商品总数
      description: 在售商品的总数量
      object: Product
      formula: COUNT(DISTINCT sku_id)
      filters:
        - field: on_sell_status
          value: "1"
      business_context: 反映平台的商品丰富度

    - name: avg_product_price
      label: 平均商品价格
      description: 在售商品的平均售价
      object: ProductPrice
      formula: AVG(ppy_price)
      filters:
        - field: on_sell_status
          value: "1"
      business_context: 反映平台的整体价格水平

    # 毛利率相关指标
    - name: avg_gross_margin
      label: 平均毛利率
      description: 在售商品的平均毛利率
      object: ProductPrice
      formula: AVG((ppy_price - cost) / ppy_price)
      join:
        - object: ProductCost
          on: ProductPrice.sku_id = ProductCost.sku_id AND ProductPrice.city = ProductCost.city
      filters:
        - field: on_sell_status
          value: "1"
      business_context: 反映平台的整体盈利能力，>30%健康，<10%需关注

    - name: low_margin_product_count
      label: 低毛利商品数
      description: 毛利率低于10%的商品数量
      object: ProductPrice
      formula: COUNT(DISTINCT sku_id)
      join:
        - object: ProductCost
          on: ProductPrice.sku_id = ProductCost.sku_id AND ProductPrice.city = ProductCost.city
      filters:
        - field: on_sell_status
          value: "1"
        - field: gross_margin
          operator: "<"
          value: 0.1
      business_context: 需要重点关注的低盈利商品

    # 销售相关指标
    - name: total_sales_amount
      label: 总销售额
      description: 所有在售商品的总销售额
      object: ProductSales
      formula: SUM(v_order_goods_amount)
      business_context: 反映平台的整体销售规模

    - name: total_sales_volume
      label: 总销量
      description: 所有在售商品的总销量
      object: ProductSales
      formula: SUM(v_goods_count)
      business_context: 反映平台的整体销售活跃度

    - name: avg_sales_per_product
      label: 单品平均销售额
      description: 每个商品的平均销售额
      object: ProductSales
      formula: AVG(v_order_goods_amount)
      business_context: 反映商品的平均销售能力

    # 竞对比价相关指标
    - name: price_advantage_rate
      label: 价格优势率
      description: 相比竞品有价格优势的商品占比
      object: CompetitorPrice
      formula: SUM(CASE WHEN price_advantage_flag='1' THEN 1 ELSE 0 END) / COUNT(*)
      business_context: 反映平台的价格竞争力，>50%表示整体有优势

    - name: price_disadvantage_count
      label: 价格劣势商品数
      description: 相比竞品价格无优势的商品数量
      object: CompetitorPrice
      formula: COUNT(DISTINCT sku_id)
      filters:
        - field: price_advantage_flag
          value: "0"
      business_context: 需要调价的商品数量

    - name: total_estimated_loss
      label: 预估总损失
      description: 因价格劣势导致的预估总损失
      object: CompetitorPrice
      formula: SUM(estimated_daily_loss)
      filters:
        - field: price_advantage_flag
          value: "0"
      business_context: 价格劣势造成的潜在销售损失

    # 预警相关指标
    - name: total_alerts
      label: 预警总数
      description: 当前待处理的预警总数
      object: PriceAlert
      formula: SUM(anomaly_count)
      filters:
        - field: handle_status
          value: "待处理"
      business_context: 需要运营团队处理的异常数量

    - name: high_priority_alerts
      label: 高优先级预警数
      description: 高优先级的预警数量
      object: PriceAlert
      formula: SUM(anomaly_count)
      filters:
        - field: priority
          value: "高"
        - field: handle_status
          value: "待处理"
      business_context: 需要优先处理的紧急异常

    # 品类相关指标
    - name: category_sales_ranking
      label: 品类销售排名
      description: 各品类的销售额排名
      object: ProductSales
      formula: SUM(v_order_goods_amount)
      group_by:
        - Product.product_type_first_level
      order_by:
        - field: sales_amount
          direction: DESC
      business_context: 识别销售表现最好的品类

    # 城市相关指标
    - name: city_sales_ranking
      label: 城市销售排名
      description: 各城市的销售额排名
      object: ProductSales
      formula: SUM(v_order_goods_amount)
      group_by:
        - city
      order_by:
        - field: sales_amount
          direction: DESC
      business_context: 识别销售表现最好的城市

