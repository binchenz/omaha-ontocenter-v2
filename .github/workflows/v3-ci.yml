name: V3 CI

on:
  push:
    branches: [main]
    paths:
      - 'v3/**'
  pull_request:
    paths:
      - 'v3/**'

jobs:
  python-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3/python-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: ruff check app/ tests/
      - run: mypy app/
      - run: pytest

  nextjs-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v3/nextjs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
